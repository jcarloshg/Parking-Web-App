services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parking_backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-parking_db}
      DB_USERNAME: ${DB_USERNAME:-parking_user}
      DB_PASSWORD: ${DB_PASSWORD:-parking_password}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_TTL: 60
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - backend_storage:/var/www/html/storage
    networks:
      - parking_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: parking_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - parking_network
    environment:
      - VITE_API_URL=/api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3

  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: parking_database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_DATABASE:-parking_db}
      MYSQL_USER: ${DB_USERNAME:-parking_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-parking_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - parking_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  parking_network:
    driver: bridge

volumes:
  backend_storage:
  mysql_data:
